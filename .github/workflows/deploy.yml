# main に push されたら Firebase(Hosting + Functions + Firestoreルール)へ自動デプロイ
# 必要なシークレット(GitHubリポジトリの Settings → Secrets and variables → Actions):
#   FIREBASE_SERVICE_ACCOUNT ... FirebaseコンソールからDLしたサービスアカウントJSONの中身
#   FIREBASE_PROJECT_ID      ... FirebaseのプロジェクトID
name: Deploy to Firebase
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install functions dependencies
        run: npm install --prefix functions
      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"
      - name: Deploy
        run: npx firebase-tools deploy --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
